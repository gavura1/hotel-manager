name: CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'

permissions:
  id-token: write
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Configurate AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::344548866144:role/github-actions-hotel-manager
          aws-region: eu-central-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.ecr-login.outputs.registry }}/hotel-manager-backend:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.ecr-login.outputs.registry }}/hotel-manager-frontend:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name hotel-manager --region eu-central-1

      - name: Deploy to EKS
        run: |
          kubectl set image deployment/backend-deployment \
            backend=${{ steps.ecr-login.outputs.registry }}/hotel-manager-backend:${{ steps.vars.outputs.sha }}
          kubectl set image deployment/frontend-deployment \
            frontend=${{ steps.ecr-login.outputs.registry }}/hotel-manager-frontend:${{ steps.vars.outputs.sha }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend-deployment --timeout=180s
          kubectl rollout status deployment/frontend-deployment --timeout=180s
