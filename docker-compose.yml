services:

  mysql:
    image: mysql:8.0
    container_name: hotel-manager-mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hotel_manager
      MYSQL_USER: hotel_user
      MYSQL_PASSWORD: hotel_pass

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    restart: always

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: hotel-manager-phpmyadmin

    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306

    ports:
      - "8081:80"

    depends_on:
      - mysql

    restart: always

volumes:
  mysql_data: