# ── Application ──────────────────────────────────────────
spring.application.name=hotel-manager

# ── Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_manager?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Google OAuth2 ─────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ── JWT ───────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:hotel-manager-secret-key-min-32-chars-long}
app.jwt.expiration-ms=86400000

# ── Server ───────────────────────────────────────────────
server.port=8080

# ── CORS (Angular dev server) ────────────────────────────
app.cors.allowed-origins=http://localhost:4200
