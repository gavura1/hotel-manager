<div class="hotel-header">
  <h2>Zoznam hotelov</h2>
  <button mat-raised-button color="primary"
          routerLink="/hotely/vytvorit"
          *ngIf="isAdmin">
    Pridať hotel
  </button>
</div>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z2">

  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let hotel">{{ hotel.id }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Názov</th>
    <td mat-cell *matCellDef="let hotel">{{ hotel.name }}</td>
  </ng-container>

  <ng-container matColumnDef="address">
    <th mat-header-cell *matHeaderCellDef>Adresa</th>
    <td mat-cell *matCellDef="let hotel">{{ hotel.address }}</td>
  </ng-container>

  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef>Popis</th>
    <td mat-cell *matCellDef="let hotel">{{ hotel.description }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let hotel">
      <button mat-button color="primary"
              [routerLink]="['/hotely', hotel.id]">
        Detail
      </button>
      <button mat-button color="primary"
              [routerLink]="['/hotely/upravit', hotel.id]"
              *ngIf="isAdmin">
        Upraviť
      </button>
      <button mat-button color="warn"
              (click)="deleteHotel(hotel.id!)"
              *ngIf="isAdmin">
        Vymazať
      </button>
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

</table>
