<div class="hotel-header">
    <h2>Správa používateľov</h2>
</div>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z2">

    <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let user">{{ user.id }}</td>
    </ng-container>

    <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Meno</th>
        <td mat-cell *matCellDef="let user">{{ user.name }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
    </ng-container>

    <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Rola</th>
        <td mat-cell *matCellDef="let user">
            <mat-form-field appearance="outline" style="width: 130px; margin: 4px 0;">
                <mat-select [(ngModel)]="user.role" (selectionChange)="updateRole(user)">
                    <mat-option *ngFor="let role of roles" [value]="role">{{ role }}</mat-option>
                </mat-select>
            </mat-form-field>
        </td>
    </ng-container>

    <ng-container matColumnDef="hotels">
        <th mat-header-cell *matHeaderCellDef>Hotely</th>
        <td mat-cell *matCellDef="let user">
            <ng-container *ngIf="user.role === 'MANAGER'">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <mat-form-field appearance="outline" style="width: 200px; margin: 4px 0;">
                        <mat-select [(ngModel)]="user.hotelIds" multiple>
                            <mat-option *ngFor="let hotel of hotels" [value]="hotel.id">{{ hotel.name }}</mat-option>
                        </mat-select>
                    </mat-form-field>
                    <button mat-raised-button color="primary" (click)="updateHotels(user)">Uložiť</button>
                </div>
            </ng-container>
            <ng-container *ngIf="user.role !== 'MANAGER'">—</ng-container>
        </td>
    </ng-container>

    <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let user"></td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
