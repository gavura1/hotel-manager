<div class="hotel-header">
  <h2>Moje rezervácie</h2>
  <button mat-raised-button color="primary"
          routerLink="/rezervacie/vytvorit">
    Nová rezervácia
  </button>
</div>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z2">

  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let booking">{{ booking.id }}</td>
  </ng-container>

  <ng-container matColumnDef="guestName">
    <th mat-header-cell *matHeaderCellDef>Meno</th>
    <td mat-cell *matCellDef="let booking">{{ booking.guestName }}</td>
  </ng-container>

  <ng-container matColumnDef="fromDate">
    <th mat-header-cell *matHeaderCellDef>Začiatok</th>
    <td mat-cell *matCellDef="let booking">{{ booking.fromDate }}</td>
  </ng-container>

  <ng-container matColumnDef="toDate">
    <th mat-header-cell *matHeaderCellDef>Do</th>
    <td mat-cell *matCellDef="let booking">{{ booking.toDate }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Stav</th>
    <td mat-cell *matCellDef="let booking">{{ booking.status }}</td>
  </ng-container>

  <ng-container matColumnDef="totalPrice">
    <th mat-header-cell *matHeaderCellDef>Suma</th>
    <td mat-cell *matCellDef="let booking">{{ booking.totalPrice }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let booking">

      <button mat-button color="warn"
              (click)="cancelBooking(booking.id!)">
        Zrušiť
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

</table>
